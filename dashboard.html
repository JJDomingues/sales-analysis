<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Analysis Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 10px;
      color: #58a6ff;
    }
    p.subtitle {
      text-align: center;
      color: #8b949e;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .card h2 {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 15px;
    }
    .card img {
      width: 100%;
      border-radius: 8px;
    }
    footer {
      text-align: center;
      margin-top: 50px;
      color: #8b949e;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <h1>Sales Analysis Dashboard</h1>
  <p class="subtitle">SQL + Python + Pandas + Matplotlib</p>

  <div class="grid">
    <div class="card">
      <h2>Clientes por Cidade</h2>
      <img src="clientes_por_cidade.png" alt="Clientes por Cidade">
    </div>
    <div class="card">
      <h2>Média de Idade por Cidade</h2>
      <img src="media_idade_por_cidade.png" alt="Média de Idade">
    </div>
    <div class="card">
      <h2>Total de Vendas por Cidade (R$)</h2>
      <img src="vendas_por_cidade.png" alt="Vendas por Cidade">
    </div>
    <div class="card">
      <h2>Total de Vendas por Cliente (R$)</h2>
      <img src="vendas_por_cliente.png" alt="Vendas por Cliente">
    </div>
  </div>

  <footer>
    Projeto desenvolvido por JJ Domingues · Sales Analysis · 2026
  </footer>

</body>
</html>
